syntax = "proto3";
package chat;

enum MsgTyp {
    Login_msg = 0;
    Login_msg_ack = 1;

    Reg_mag = 2;
    Reg_msg_ack = 3;

    Add_msg = 4;

    Onechat_msg = 5;

    Creategroup_msg = 6;

    Addgroup_msg = 7;

    Groupchat_msg = 8;

    Logout_msg = 9;
}

message LoginReq {
    int32 msgid = 1;
    int32 userid = 2;
    string password = 3;
}

message LoginRes {
    int32 msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message RegisterReq {
    int32 msgid = 1;
    string name = 2;
    string password = 3;
}

message RegisterRes {
    int32 msgid = 1;
    int32 err = 2;
    int32 userid = 3;
}

message AddFriendReq {
    int32 msgid = 1;
    int32 userid = 2;
    int32 friendid = 3;
}

message OneChatReq {
    int32 msgid = 1;
    int32 fromid = 2;
    int32 toid = 3;
    string msg = 4;
}

message CreategroupReq {
    int32 msgid = 1;
    int32 userid = 2;
    string groupname = 3;
    string groupdesc = 4;
}

message AddGroupReq {
    int32 msgid = 1;
    int32 userid = 2;
    int32 groupid = 3;
}

message GroupChatReq {
    int32 msgid = 1;
    int32 userid = 2;
    int32 groupid = 3;
    string msg = 4;
}

message LogoutReq {
    int32 msgid = 1;
    int32 userid = 2;
}