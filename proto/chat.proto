syntax = "proto3";
package chat;

enum MsgTyp {
    UNKNOWN_MSG = 0;

    LOGIN_MSG = 1;
    LOGIN_MSG_ACK = 2;

    REG_MSG = 3;
    REG_MSG_ACK = 4;

    ADD_FRIEND_MSG = 5;
    ADD_FRIEND_MSG_ACK = 6;

    ONE_CHAT_MSG = 7;
    ONE_CHAT_MSG_ACK = 8;

    CREATE_GROUP_MSG = 9;
    CREATE_GROUP_MSG_ACK = 10;

    ADD_GROUP_MSG = 11;
    ADD_GROUP_MSG_ACK = 12;

    GROUP_CHAT_MSG = 13;
    GROUP_CHAT_MSG_ACK = 14;

    LOGOUT_MSG = 15;
    LOGOUT_MSG_ACK = 16;
}

message LoginReq {
    int32 msgid = 1;
    int32 id = 2;
    string password = 3;
}

message LoginRes {
    int32 err = 1;
    string errmsg = 2;
    User user = 3;
    repeated User friends = 4;
    repeated Group groups = 5;
    repeated string offlineMsgs = 6;
}

message RegisterReq {
    int32 msgid = 1;
    string name = 2;
    string password = 3;
}

message RegisterRes {
    int32 err = 1;
    string errmsg = 2;
    int32 userid = 3;
}

message AddFriendReq {
    MsgTyp msgid = 1;
    int32 userid = 2;
    int32 friendid = 3;
}

message AddFriendRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message OneChatReq {
    MsgTyp msgid = 1;
    int32 fromid = 2;
    int32 toid = 3;
    string msg = 4;
}

message OneChatRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message CreateGroupReq {
    MsgTyp msgid = 1;
    int32 userid = 2;
    string groupname = 3;
    string groupdesc = 4;
}

message CreateGroupRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
    int32 groupid = 4;
}

message AddGroupReq {
    MsgTyp msgid = 1;
    int32 userid = 2;
    int32 groupid = 3;
    string role = 4;
}

message AddGroupRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message GroupChatReq {
    MsgTyp msgid = 1;
    int32 userid = 2;
    int32 groupid = 3;
    string msg = 4;
}

message GroupChatRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message LogoutReq {
    MsgTyp msgid = 1;
    int32 userid = 2;
}

message LogoutRes {
    MsgTyp msgid = 1;
    int32 err = 2;
    string errmsg = 3;
}

message User {
    int32 id = 1;
    string name = 2;
    string state = 3;
}

message GroupUser {
    int32 id = 1;
    string name = 2;
    string state = 3;
}

message Group {
    int32 id = 1;
    string name = 2;
    string desc = 3;
    repeated GroupUser users = 4;
}